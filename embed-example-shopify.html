<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kitchen Configurator - Shopify Integration Example</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
      margin: 0;
      padding: 20px;
      background: #f5f5f5;
    }
    .container {
      max-width: 1200px;
      margin: 0 auto;
      background: white;
      padding: 20px;
      border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }
    h1 {
      color: #333;
      margin-bottom: 10px;
    }
    .info {
      background: #e8f5e9;
      padding: 15px;
      border-radius: 4px;
      margin-bottom: 20px;
      border-left: 4px solid #4caf50;
    }
    .info code {
      background: rgba(0,0,0,0.05);
      padding: 2px 6px;
      border-radius: 3px;
      font-family: 'Monaco', 'Courier New', monospace;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Kitchen Configurator - Shopify Integration</h1>
    
    <div class="info">
      <strong>ℹ️ Configuration:</strong><br>
      This example demonstrates Shopify integration using the new platform config format.<br>
      Platform: <code>shopify</code><br>
      Domain: <code>your-store.myshopify.com</code><br>
      <br>
      <strong>Note:</strong> Replace the credentials below with your actual Shopify store credentials.
    </div>

    <!-- Widget container -->
    <kitchen-configurator-widget></kitchen-configurator-widget>
  </div>

  <!-- Widget Configuration (New Format) -->
  <script>
    window.kitchenConfiguratorConfig = {
      platform: {
        type: 'shopify',
        domain: 'your-store.myshopify.com',
        storefrontAccessToken: 'your-storefront-access-token-here'
      }
    };
  </script>

  <!-- Widget Script -->
  <script src="./dist/configurator-widget.iife.js"></script>

  <!-- Debug Info -->
  <script>
    console.log('🔧 Shopify Integration Example (New Format)');
    console.log('📦 Config:', window.kitchenConfiguratorConfig);
    console.log('🎯 Platform:', window.kitchenConfiguratorConfig.platform.type);
  </script>
</body>
</html>
